version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agricbylovely_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agricbylovely
    ports:
      - '5432:5432'
    volumes:
      - agricbylovely_pgdata:/var/lib/postgresql/data

volumes:
  agricbylovely_pgdata: